services:
  - type: web
    name: aegis-firewall
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: FPE_KEY
        sync: false
      - key: FPE_TWEAK
        sync: false
      - key: LLM_PROVIDER
        value: anthropic
      - key: LLM_MODEL
        value: claude-haiku-4-5
